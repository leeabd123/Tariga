const EXTRA=[
  // ── Conversational mechanics ──
  {a:"خلاص",p:"khalaas",e:"That's it / done / enough / finished",ctx:"One of the most versatile Sudanese words. Closes a topic, signals acceptance, or says 'that's enough.' Use it constantly.",ex:"خلاص — ما في كلام بعدين.",exen:"That's it — no more talk after this.",cat:"Connectors",src:"v1",type:"Word"},
  {a:"طيب",p:"tayib",e:"Okay / alright / right then",ctx:"Signals agreement, a topic shift, or readiness to move on. Often starts a new question or response.",ex:"طيب، سؤال تاني — شنو أول أغنية كتبتها؟",exen:"Alright, next question — what was the first song you wrote?",cat:"Connectors",src:"v1",type:"Word"},
  {a:"يلا",p:"yalla",e:"Let's go / come on / alright then",ctx:"Expresses readiness, encouragement, or impatience. Used to kick something off.",ex:"يلا — نبدأ السؤال الأول.",exen:"Let's go — we start with the first question.",cat:"Connectors",src:"v1",type:"Word"},
  {a:"بعدين",p:"ba3dayn",e:"Then / after that / later",ctx:"Sequence word. 'And after that...' Moves a story or argument forward in time.",ex:"بعدين لما كبرت بقيت أفهم الأمور.",exen:"Then as I grew up I started understanding things.",cat:"Connectors",src:"v1",type:"Word"},
  {a:"لكن",p:"lakin",e:"But / however",ctx:"The standard contrast connector. Used to introduce a counterpoint or qualification.",ex:"لكن في نفس الوقت الموضوع ما سهل.",exen:"But at the same time the matter isn't easy.",cat:"Connectors",src:"v1",type:"Word"},
  {a:"حتى",p:"hatta",e:"Even / until / to the extent of",ctx:"Adds emphasis. 'Even this happened.' Or used for time: 'until then.'",ex:"حتى الزول اللي ما بعرفك بيحبك.",exen:"Even the person who doesn't know you loves you.",cat:"Connectors",src:"v1",type:"Word"},
  {a:"زي ما",p:"zay ma",e:"Just like / the same way that",ctx:"Makes comparisons. 'Just like you said...' or 'the same way that...'",ex:"زي ما قلت — الموضوع محتاج وقت.",exen:"Just like I said — the matter needs time.",cat:"Connectors",src:"v1",type:"Word"},
  {a:"في نهاية الأمر",p:"fi nihayat al-amr",e:"At the end of the day / ultimately",ctx:"Closes arguments or reflections. Used when landing on the core truth.",ex:"في نهاية الأمر كل واحد مسؤول عن نفسه.",exen:"At the end of the day each person is responsible for themselves.",cat:"Connectors",src:"v1",type:"Phrase"},
  {a:"من ناحية",p:"min nahyat",e:"From the angle of / in terms of",ctx:"Introduces a specific dimension of discussion. 'In terms of responsibility...'",ex:"من ناحية مسؤولية الحاجة دي كبيرة شديد.",exen:"In terms of responsibility this thing is very big.",cat:"Connectors",src:"v2",type:"Phrase"},
  {a:"في حته",p:"fi hitta",e:"In the area of / on the topic of / in that zone",ctx:"Very Sudanese way to say 'on this topic' or 'in this space.' Used constantly.",ex:"في حتة الصداقات الموضوع صعب بعد الشهرة.",exen:"In the area of friendships things get hard after fame.",cat:"Connectors",src:"v1",type:"Phrase"},
  {a:"الحاجة الحلوة",p:"al-haga al-helwa",e:"The beautiful/good thing",ctx:"Used to introduce something positive. 'The beautiful thing about this is...'",ex:"الحاجة الحلوة إنو الناس بتحبك بجد.",exen:"The beautiful thing is that people genuinely love you.",cat:"Connectors",src:"v2",type:"Phrase"},
  {a:"في حال",p:"fi haal",e:"In the event that / if / assuming that",ctx:"Conditional phrase. 'In the event that you keep going...'",ex:"في حال فضلت تنحت في الصخر — حتوصل.",exen:"In the event that you keep grinding — you'll get there.",cat:"Connectors",src:"v1",type:"Phrase"},
  {a:"مش بس",p:"mish bas",e:"Not just / not only",ctx:"Expands beyond a single point. 'Not just that, but also...'",ex:"مش بس في السودان — في الخارج كمان.",exen:"Not just in Sudan — abroad too.",cat:"Connectors",src:"v1",type:"Phrase"},
  {a:"وكمان",p:"w-kaman",e:"And also / and as well",ctx:"Adds another point. The Sudanese equivalent of 'and also.'",ex:"هو كاتب وكمان بيغني وكمان بيعمل شغل كتير.",exen:"He writes and also sings and also does a lot of work.",cat:"Connectors",src:"v1",type:"Word"},
  {a:"عشان كدا",p:"3ashan kida",e:"That's why / because of that / for that reason",ctx:"Causal connector. Explains WHY something is the case.",ex:"عشان كدا أنا بحاول أتطور من نفسي دايماً.",exen:"That's why I always try to develop myself.",cat:"Connectors",src:"v1",type:"Phrase"},
  {a:"ما زي",p:"ma zay",e:"Not like / unlike / different from",ctx:"Draws a contrast. 'It's not like other things.'",ex:"الطبيخ ما زي أي كونتنت تاني.",exen:"Cooking isn't like any other content.",cat:"Connectors",src:"v2",type:"Phrase"},
  {a:"اللي هو",p:"alli huw",e:"Which is / that is / meaning",ctx:"Explains or defines what was just said. 'Which is basically...'",ex:"المجال، اللي هو الراب، صعب شديد.",exen:"The field, which is rap, is extremely difficult.",cat:"Connectors",src:"v1",type:"Phrase"},
  {a:"قصدي",p:"qasdi",e:"What I mean / my point is",ctx:"Clarifies what you're trying to say. Like 'what I mean is...'",ex:"قصدي إنو الموضوع محتاج صبر.",exen:"What I mean is that the matter needs patience.",cat:"Connectors",src:"v2",type:"Phrase"},
  // ── Emphasis & reactions ──
  {a:"والله",p:"wallahi",e:"I swear / by God / honestly",ctx:"The most natural oath/intensifier. Adds sincerity and weight. Used in every conversation.",ex:"والله ما كنت متوقع إنو الموضوع يوصل لكدا.",exen:"I swear I didn't expect things to reach this point.",cat:"Emphasis",src:"v1",type:"Word"},
  {a:"أكيد",p:"akeed",e:"Of course / definitely / certainly",ctx:"Affirms something strongly. 'Definitely yes' or 'of course that's true.'",ex:"أكيد — الإخلاص هو الأهم.",exen:"Definitely — sincerity is the most important thing.",cat:"Emphasis",src:"v1",type:"Word"},
  {a:"طبعاً",p:"tab3an",e:"Of course / naturally / obviously",ctx:"Similar to أكيد but softer. Something that goes without saying.",ex:"طبعاً كل ده من ربنا.",exen:"Of course all of this is from God.",cat:"Emphasis",src:"v1",type:"Word"},
  {a:"بالعكس",p:"bil-3aks",e:"On the contrary / quite the opposite",ctx:"Reverses what was expected. 'Actually it's the opposite.'",ex:"بالعكس — الناس بتحبني أكتر لما بكون على طبيعتي.",exen:"On the contrary — people love me more when I'm natural.",cat:"Emphasis",src:"v2",type:"Phrase"},
  {a:"مش ضروري",p:"mish daroori",e:"Not necessarily / it's not required",ctx:"Qualifies a claim. 'That's not always true.'",ex:"مش ضروري إنك تنتشر عشان تكون ناجح.",exen:"It's not necessarily the case that you have to go viral to succeed.",cat:"Emphasis",src:"v2",type:"Phrase"},
  {a:"بجد",p:"bi-jad",e:"For real / seriously / genuinely (variant of بالجد)",ctx:"Lighter version of بالجد. Used mid-sentence for emphasis.",ex:"هو بجد غيّر حاجة في طريقة تفكيري.",exen:"He genuinely changed something in the way I think.",cat:"Emphasis",src:"v1",type:"Word"},
  {a:"ما زمان",p:"ma zaman",e:"Not anymore / that's no longer the case",ctx:"Says something used to be true but isn't now. Time has changed things.",ex:"ما زمان الناس بتتقبل الحاجة دي — هسه أحسن.",exen:"It's not like before — people accept it better now.",cat:"Emphasis",src:"v2",type:"Phrase"},
  {a:"أهم حاجة",p:"ahimm haga",e:"The most important thing",ctx:"Highlights the priority. Used to land on what really matters.",ex:"أهم حاجة إنك تحب اللي بتعمله.",exen:"The most important thing is that you love what you do.",cat:"Emphasis",src:"v2",type:"Phrase"},
  {a:"نفس الشيء",p:"nafs ash-shay'",e:"The same thing / exactly that",ctx:"Used when two things align or when agreeing with something.",ex:"أنا برضو حاسس نفس الشيء.",exen:"I also feel the same thing.",cat:"Emphasis",src:"v1",type:"Phrase"},
  {a:"في نظري",p:"fi nazri",e:"In my view / the way I see it",ctx:"Frames a personal opinion. 'The way I see it...'",ex:"في نظري الإخلاص أهم من الموهبة.",exen:"In my view sincerity is more important than talent.",cat:"Emphasis",src:"v1",type:"Phrase"},
  {a:"بتاعك",p:"bata3k",e:"Yours / belonging to you",ctx:"The Sudanese possessive. 'Your thing / your style / your world.' Used constantly.",ex:"الكونتنت بتاعك مختلف شديد.",exen:"Your content is very different.",cat:"Connectors",src:"v2",type:"Word"},
  {a:"هسه",p:"hissa",e:"Now / right now / at this moment",ctx:"The Sudanese word for 'now.' More immediate than the standard Arabic الآن.",ex:"هسه أنا في مرحلة مختلفة تماماً.",exen:"Right now I'm in a completely different stage.",cat:"Connectors",src:"v1",type:"Word"},
  {a:"زمان",p:"zaman",e:"Before / in the past / back then",ctx:"Used to contrast past and present. 'Before this happened...'",ex:"زمان كنا ما نتخيل الموضوع يوصل لكدا.",exen:"Before, we couldn't have imagined things reaching this point.",cat:"Connectors",src:"v1",type:"Word"},
  {a:"من أول الناس",p:"min awwal an-nas",e:"Among the first people / one of the first",ctx:"Used to highlight someone who was early to do something.",ex:"هو من أول الناس اللي شجعوني في الموضوع دا.",exen:"He was one of the first people who encouraged me in this.",cat:"Praise",src:"v1",type:"Phrase"},
  // ── Character & people ──
  {a:"زول",p:"zool",e:"A person / someone",ctx:"The Sudanese word for 'person.' Gender neutral. Used constantly instead of شخص.",ex:"الزول دا من أحسن ناس قابلتهم في حياتي.",exen:"That person is one of the best people I've met in my life.",cat:"Character",src:"v1",type:"Word"},
  {a:"الزول ده",p:"az-zool dah",e:"This person / that guy / that one",ctx:"Points to a specific person being discussed. Very common in storytelling.",ex:"الزول ده حقيقي غيّر المجال دا.",exen:"This person genuinely changed this field.",cat:"Character",src:"v1",type:"Phrase"},
  {a:"ناس كتار",p:"naas kitaar",e:"Many people / a lot of people",ctx:"Describes a large number of people. More Sudanese than ناس كثيرون.",ex:"ناس كتار بيعرفوا أسامة لكن ما كلهم بيعرفوا سولجا.",exen:"Many people know Osama but not all of them know Solja.",cat:"Character",src:"v1",type:"Phrase"},
  {a:"حد",p:"hadd",e:"Anyone / someone / nobody",ctx:"Colloquial equivalent of أحد. 'Not anyone knows...' or 'is there someone who...'",ex:"ما في حد قادر يعمل الحاجة دي زيه.",exen:"There isn't anyone who can do this thing like him.",cat:"Character",src:"v2",type:"Word"},
  {a:"كل واحد",p:"kull wahid",e:"Each person / everyone",ctx:"Refers to each individual separately. 'Every single person...'",ex:"كل واحد عنده أسلوبه الخاص.",exen:"Each person has their own style.",cat:"Character",src:"v2",type:"Phrase"},
  {a:"صاحبي / صاحبتي",p:"sahibi / sahibti",e:"My friend (male / female)",ctx:"Close friend. More intimate than just زميل.",ex:"صاحبي من زمان — نعرف بعض من الجامعة.",exen:"My friend from way back — we've known each other since university.",cat:"Relationships",src:"v1",type:"Word"},
  {a:"أهلي",p:"ahli",e:"My family / my people",ctx:"Refers to family broadly — parents, siblings, extended family.",ex:"أهلي كانوا دايماً بيدعموني.",exen:"My family always supported me.",cat:"Relationships",src:"v1",type:"Word"},
  {a:"ناس بتاعتك",p:"naas bata3tak",e:"Your people / your crew",ctx:"The people in your circle. More possessive and intimate than just الناس.",ex:"ناس بتاعتك اللي بتعتمد عليهم في أصعب الأوقات.",exen:"Your people are the ones you rely on in the hardest times.",cat:"Relationships",src:"v1",type:"Phrase"},
  {a:"طرف ثاني",p:"taraf tani",e:"The other party / the other person",ctx:"Used in relationship or conflict discussions. 'From the other person's side...'",ex:"لازم تشوف الموضوع من ناحية الطرف الثاني.",exen:"You have to look at the matter from the other person's side.",cat:"Relationships",src:"v1",type:"Phrase"},
  // ── Time & process ──
  {a:"فترة",p:"fatra",e:"A period / a stretch of time",ctx:"Used for a phase or era. 'During that period...'",ex:"في الفترة دي كنت بتعلم كتير.",exen:"During that period I was learning a lot.",cat:"Time",src:"v1",type:"Word"},
  {a:"من بدري",p:"min badri",e:"From early on / from a young age",ctx:"Describes something that started early in life or early in a process.",ex:"من بدري كان عنده الموهبة دي.",exen:"From early on he had this talent.",cat:"Time",src:"v1",type:"Phrase"},
  {a:"لحد الآن",p:"li-hadd al-aan",e:"Until now / up to this point",ctx:"Used to describe something that continues to the present.",ex:"لحد الآن ما فهمت ليه الموضوع اتأخر.",exen:"Until now I haven't understood why the matter was delayed.",cat:"Time",src:"v1",type:"Phrase"},
  {a:"من وقتها",p:"min waqtiha",e:"Since then / from that point on",ctx:"Marks a turning point after which something changed.",ex:"من وقتها بقيت أشوف الأمور بطريقة مختلفة.",exen:"Since then I started seeing things differently.",cat:"Time",src:"v1",type:"Phrase"},
  {a:"في البداية",p:"fi al-bidaya",e:"In the beginning / at first",ctx:"Sets up a contrast with how things are now. 'At first it was like this...'",ex:"في البداية ما كان عندي جمهور أصلاً.",exen:"In the beginning I didn't have any audience at all.",cat:"Time",src:"v1",type:"Phrase"},
  {a:"مع الوقت",p:"ma3 al-waqt",e:"Over time / with time",ctx:"Used to describe gradual change or development.",ex:"مع الوقت بتفهم الناس أكتر.",exen:"Over time you understand people better.",cat:"Time",src:"v1",type:"Phrase"},
  {a:"أول ما",p:"awwal ma",e:"As soon as / the moment that",ctx:"Marks the immediate trigger of something. 'The moment I started...'",ex:"أول ما بديت أنزل فيديوهات — الناس استجابت.",exen:"As soon as I started posting videos — people responded.",cat:"Time",src:"v2",type:"Phrase"},
  {a:"من قبل",p:"min qabl",e:"Before / previously / beforehand",ctx:"References a prior state or action.",ex:"من قبل ما كنت أتخيل إنو الموضوع يوصل لكدا.",exen:"Before I couldn't have imagined things reaching this point.",cat:"Time",src:"v2",type:"Phrase"},
  // ── Inner world expanded ──
  {a:"مبسوط",p:"mabsoot",e:"Happy / pleased / content",ctx:"The everyday Sudanese word for happy. Not formal like سعيد.",ex:"أنا مبسوط إنو في ناس بتستمتع بالمحتوى.",exen:"I'm happy that there are people who enjoy the content.",cat:"Inner world",src:"v1",type:"Word"},
  {a:"خايف",p:"khaayif",e:"Scared / afraid",ctx:"The colloquial present tense of fear. 'I'm scared that...'",ex:"خايف إنو الناس ما تتقبل الحاجة دي.",exen:"I'm scared that people won't accept this thing.",cat:"Inner world",src:"v2",type:"Word"},
  {a:"واثق",p:"waathiq",e:"Confident / certain / sure",ctx:"Used about belief in yourself or in an outcome.",ex:"ما كنت واثق إنو الموضوع يمشي كويس.",exen:"I wasn't confident that things would go well.",cat:"Inner world",src:"v1",type:"Word"},
  {a:"متأكد",p:"muta'akkid",e:"Sure / certain",ctx:"More intellectual certainty than واثق. 'I'm sure of the facts.'",ex:"متأكد إنو الحاجة دي صح.",exen:"I'm sure this thing is right.",cat:"Inner world",src:"v1",type:"Word"},
  {a:"مستنيك",p:"mistneenak",e:"Waiting for you / expecting you",ctx:"Used warmly to say someone is awaited or anticipated.",ex:"الجمهور مستنيك دايماً — ما تختفي كتير.",exen:"The audience is always waiting for you — don't disappear for too long.",cat:"Inner world",src:"v1",type:"Word"},
  {a:"حاسس / حاسه",p:"haasis / haasha",e:"I feel / feeling (male/female)",ctx:"The colloquial present tense for feeling something.",ex:"حاسس إنو الموضوع أكبر مني شوية.",exen:"I feel like the matter is a bit bigger than me.",cat:"Inner world",src:"v1",type:"Word"},
  {a:"مؤمن بكدا",p:"mu'min bi-kida",e:"I believe in this / I have faith in this",ctx:"Expresses conviction. Often follows بالجد for added sincerity.",ex:"بالجد مؤمن إنو الصبر مفتاح النجاح.",exen:"I genuinely believe that patience is the key to success.",cat:"Inner world",src:"v1",type:"Phrase"},
  {a:"قلقان",p:"qalqaan",e:"Worried / anxious",ctx:"Colloquial for feeling anxious or worried about something.",ex:"قلقان على نفسيتو في الفترة دي.",exen:"He's worried about his mental state during this period.",cat:"Inner world",src:"v1",type:"Word"},
  {a:"محتاج",p:"muhtaaj",e:"I need / in need of",ctx:"Expresses a need. 'I needed someone to tell me...'",ex:"محتاج وقت أرتاح فيه.",exen:"I need time to rest.",cat:"Inner world",src:"v2",type:"Word"},
  {a:"الضغط",p:"ad-daght",e:"The pressure / the stress",ctx:"The pressure of work, expectations, or circumstances.",ex:"الضغط بتاع الشهرة ما بسيط.",exen:"The pressure of fame is not simple.",cat:"Inner world",src:"v2",type:"Word"},
  {a:"راحة البال",p:"raahat al-baal",e:"Peace of mind / mental ease",ctx:"The state of being mentally free from worry.",ex:"راحة البال أهم من أي نجاح.",exen:"Peace of mind is more important than any success.",cat:"Inner world",src:"v2",type:"Phrase"},
  {a:"استحمل",p:"istahamal",e:"Can't take it / to bear / endure",ctx:"Used when something is too much. 'I can't bear this anymore.'",ex:"الهيت كومنتس ما قادر أستحملها.",exen:"I can't bear the hate comments.",cat:"Inner world",src:"v2",type:"Word"},
  {a:"أثّر فيّ",p:"aththar fiyy",e:"It affected me / it impacted me",ctx:"How something landed on you emotionally or mentally.",ex:"كلامه أثّر فيّ شديد.",exen:"What he said affected me a lot.",cat:"Inner world",src:"v2",type:"Phrase"},
  // ── Social & culture ──
  {a:"بتحكم",p:"bithkum",e:"Judge / pass judgment on",ctx:"Used when someone makes unfair assessments. 'People judge you based on...'",ex:"الناس بتحكم عليك من فيديو واحد.",exen:"People judge you based on one video.",cat:"Society",src:"v2",type:"Word"},
  {a:"المجتمع",p:"al-mujtama3",e:"Society / the community",ctx:"Refers to the broader social environment and its expectations.",ex:"المجتمع السوداني بادي يتغير.",exen:"Sudanese society is starting to change.",cat:"Society",src:"v2",type:"Word"},
  {a:"السوسايتي",p:"as-society",e:"Society (English loanword)",ctx:"Used interchangeably with المجتمع — slightly more modern-sounding.",ex:"السوسايتي مش ريدية دايماً للحاجات الجديدة.",exen:"Society isn't always ready for new things.",cat:"Society",src:"v2",type:"Word"},
  {a:"النورم",p:"an-norm",e:"The norm / what's considered normal",ctx:"English loanword used naturally. What people consider the standard or acceptable.",ex:"إحنا بنتحدى النورم بكل حاجة بنعملها.",exen:"We challenge the norm with everything we do.",cat:"Society",src:"v2",type:"Word"},
  {a:"مقبول",p:"maqbool",e:"Accepted / acceptable / approved",ctx:"Whether something is socially acceptable or not.",ex:"الحاجة دي مش مقبولة في المجتمع هسه.",exen:"This thing isn't accepted in society yet.",cat:"Society",src:"v2",type:"Word"},
  {a:"التقدم",p:"at-taqaddum",e:"Progress / advancement",ctx:"Moving forward — culturally, personally, or professionally.",ex:"في تقدم حقيقي في المجال دا.",exen:"There's real progress in this field.",cat:"Society",src:"v2",type:"Word"},
  {a:"انفتاح",p:"infitaah",e:"Openness / opening up",ctx:"When a person, community, or country becomes more open-minded.",ex:"في انفتاح أكتر في السودان على الفنون.",exen:"There's more openness in Sudan toward the arts.",cat:"Society",src:"v2",type:"Word"},
  {a:"بتستهجن",p:"bitistahijn",e:"To disapprove / find something unacceptable",ctx:"When people react negatively to something they consider wrong.",ex:"الناس بتستهجن الحاجة دي لأنها جديدة.",exen:"People disapprove of this thing because it's new.",cat:"Society",src:"v2",type:"Word"},
  {a:"الواقع",p:"al-waqi3",e:"Reality / the real situation",ctx:"Used to ground something in what's actually true.",ex:"الواقع إنو المجال دا صعب شديد.",exen:"The reality is that this field is very difficult.",cat:"Society",src:"v1",type:"Word"},
  {a:"الحقيقة",p:"al-haqeeqa",e:"The truth / the real thing",ctx:"Used when landing on what's genuinely true, not just the surface.",ex:"الحقيقة إنو النجاح ما بييجي بسرعة.",exen:"The truth is that success doesn't come quickly.",cat:"Society",src:"v1",type:"Word"},
  // ── Work & craft ──
  {a:"شغل",p:"shughl",e:"Work / the job / the craft",ctx:"Refers to your work broadly — creative, professional, or personal.",ex:"الشغل بتاعه دايماً عالي المستوى.",exen:"His work is always high quality.",cat:"Creative field",src:"v1",type:"Word"},
  {a:"المستوى",p:"al-mustawa",e:"The level / the standard",ctx:"Used when assessing quality or achievement.",ex:"المستوى بتاعه اتحسّن كتير.",exen:"His level has improved a lot.",cat:"Creative field",src:"v1",type:"Word"},
  {a:"موهبة",p:"mawhibba",e:"Talent / a gift",ctx:"Natural ability. Distinguished from effort and practice.",ex:"الموهبة مش كافية — لازم تشتغل عليها.",exen:"Talent isn't enough — you have to work on it.",cat:"Creative field",src:"v1",type:"Word"},
  {a:"بيبدع",p:"byibdi3",e:"He creates / he's being creative",ctx:"The verb form of إبداع. Someone actively producing creative work.",ex:"الزول ده بيبدع في كل حاجة بيعملها.",exen:"That person creates brilliantly in everything he does.",cat:"Creative field",src:"v1",type:"Word"},
  {a:"منجز",p:"munjaz",e:"Accomplished / an achievement",ctx:"Something produced or accomplished. Can be a noun (an achievement) or adjective.",ex:"الإيبي الجديد منجز كبير.",exen:"The new EP is a major achievement.",cat:"Creative field",src:"v1",type:"Word"},
  {a:"إنتاج",p:"intaaj",e:"Production / output / producing",ctx:"The act of producing content, music, or any creative work.",ex:"إنتاجه كان كتير الفترة دي.",exen:"His output was a lot during this period.",cat:"Creative field",src:"v1",type:"Word"},
  {a:"برودكت",p:"product",e:"The product / the output",ctx:"English loanword referring to the final creative result.",ex:"البرودكت عامل كيف؟ هل راضي عنه؟",exen:"How's the product? Are you satisfied with it?",cat:"Creative field",src:"v1",type:"Word"},
  {a:"أسلوب",p:"uslub",e:"Style / approach / method",ctx:"Your distinctive way of doing things — in art, speaking, or life.",ex:"أسلوبه في الكلام مختلف شديد.",exen:"His speaking style is very different.",cat:"Creative field",src:"v2",type:"Word"},
  {a:"مدرسة",p:"madrasa",e:"School / tradition / approach",ctx:"Metaphorical — your 'school' of thought or artistic tradition.",ex:"هو عنده مدرسته الخاصة في الراب.",exen:"He has his own school in rap.",cat:"Creative field",src:"v1",type:"Word"},
  {a:"فرصة",p:"fursa",e:"An opportunity / a chance",ctx:"Used when discussing chances to grow, be heard, or succeed.",ex:"بحاول أزيد الفرص للناس اللي بتتعب.",exen:"I try to increase opportunities for people who are working hard.",cat:"Creative field",src:"v1",type:"Word"},
  {a:"بيشتغل",p:"byishtaghil",e:"He works / he's working",ctx:"General verb for working. Can refer to creative or professional work.",ex:"الزول دا بيشتغل بجد — ما بيقصّر.",exen:"That person works hard — he doesn't cut corners.",cat:"Work ethic",src:"v1",type:"Word"},
  {a:"جاد",p:"jaad",e:"Serious / dedicated / committed",ctx:"Describes someone who takes something seriously and puts in real effort.",ex:"لما تكون جاد في الموضوع الناس بتحس.",exen:"When you're serious about something people can feel it.",cat:"Work ethic",src:"v1",type:"Word"},
  {a:"أفورت",p:"effort",e:"Effort / hard work",ctx:"English loanword used naturally. The effort you put in.",ex:"بتاخذ أفورت حقيقي عشان تطلع حاجة.",exen:"It takes real effort to put something out.",cat:"Work ethic",src:"v1",type:"Word"},
  {a:"ما بقصّر",p:"ma biqassar",e:"He doesn't cut corners / doesn't slack",ctx:"Used to praise someone's consistency and dedication.",ex:"هو ما بقصّر — دايماً بيديها بجد.",exen:"He doesn't cut corners — he always gives it his all.",cat:"Work ethic",src:"v1",type:"Phrase"},
  {a:"خطة",p:"khatta",e:"A plan / a strategy",ctx:"Used for future planning or current strategy.",ex:"ما عندي خطة واضحة — في حاجات كتيرة تغيّرت.",exen:"I don't have a clear plan — many things changed.",cat:"Work ethic",src:"v2",type:"Word"},
  // ── Podcast & social media ──
  {a:"حلقة",p:"halqa",e:"An episode / a session",ctx:"Used for podcast or show episodes. المتابعون = followers.",ex:"الحلقة دي فيري فيري سبيشال.",exen:"This episode is very very special.",cat:"Podcast",src:"v2",type:"Word"},
  {a:"ضيف",p:"dayf",e:"Guest",ctx:"The person invited on the show.",ex:"الضيف الليلة هو سولجا سمكرة.",exen:"Tonight's guest is Solja Samkara.",cat:"Podcast",src:"v1",type:"Word"},
  {a:"فقرة",p:"faqra",e:"A segment / section of a show",ctx:"A defined part of the podcast with its own purpose.",ex:"دلوقتي في فقرة الشمار.",exen:"Now we're in the gossip segment.",cat:"Podcast",src:"v2",type:"Word"},
  {a:"جمهور",p:"jamhoor",e:"Audience / fans",ctx:"The people who follow and watch.",ex:"الجمهور بتاعنا بادي يكبر كتير.",exen:"Our audience is starting to grow a lot.",cat:"Podcast",src:"v1",type:"Word"},
  {a:"فولورز",p:"followers",e:"Followers",ctx:"English loanword — social media followers.",ex:"لما بدأ الفولورز يزيدوا حسيت بمسؤولية.",exen:"When the followers started increasing I felt responsibility.",cat:"Social media",src:"v2",type:"Word"},
  {a:"فيديوهات",p:"videohaat",e:"Videos",ctx:"Content videos — the plural of فيديو.",ex:"فيديوهات الطبيخ أشهر حاجة بتعملها.",exen:"Cooking videos are the most famous thing she does.",cat:"Social media",src:"v2",type:"Word"},
  {a:"إنترتينمنت",p:"entertainment",e:"Entertainment",ctx:"English loanword. What a creator provides — not advice, not life coaching.",ex:"بقدم إنترتينمنت — لا أكثر لا أقل.",exen:"I provide entertainment — no more, no less.",cat:"Social media",src:"v2",type:"Word"},
  {a:"التفاعل",p:"at-tafa3ul",e:"Engagement / interaction",ctx:"How the audience responds — comments, likes, shares.",ex:"التفاعل مع الفيديو كان رهيب شديد.",exen:"The engagement with the video was incredible.",cat:"Social media",src:"v2",type:"Word"},
  {a:"ريسبونس",p:"response",e:"Response / reaction",ctx:"English loanword referring to how people respond.",ex:"الريسبونس بتاع الناس كان مفاجأة.",exen:"The people's response was a surprise.",cat:"Social media",src:"v2",type:"Word"},
  {a:"بنزل حاجة",p:"banzil haga",e:"I post something / I put something out",ctx:"Colloquial for uploading or releasing content.",ex:"لما بنزل حاجة بحاول تكون بجد.",exen:"When I post something I try to make it genuine.",cat:"Social media",src:"v2",type:"Phrase"},
  {a:"انتشر",p:"intashar",e:"It spread / went viral / reached people",ctx:"When content travels beyond your immediate audience.",ex:"الأغنية انتشرت بسرعة شديدة.",exen:"The song spread very quickly.",cat:"Social media",src:"v1",type:"Word"},
  // ── Sudanese idioms & culture ──
  {a:"ما بتاعي",p:"ma bita3i",e:"Not mine / doesn't belong to me",ctx:"Used to disclaim something. 'That's not my thing.'",ex:"الحاجة دي ما بتاعتي — مش أسلوبي.",exen:"That thing isn't mine — it's not my style.",cat:"Everyday",src:"v1",type:"Phrase"},
  {a:"بتاعنا",p:"bata3na",e:"Ours / belonging to us",ctx:"The Sudanese possessive plural. 'Our thing / our culture.'",ex:"الراب السوداني بتاعنا بادي يوصل العالم.",exen:"Our Sudanese rap is starting to reach the world.",cat:"Everyday",src:"v1",type:"Word"},
  {a:"دكاترة ومهندسين",p:"daktara w-muhandiseen",e:"Doctors and engineers",ctx:"The phrase used to represent the narrow view of Sudanese talent — we're more than this.",ex:"ما بس دكاترة ومهندسين — عندنا تالنتس كتيرة.",exen:"Not just doctors and engineers — we have many talents.",cat:"Sudan",src:"v2",type:"Phrase"},
  {a:"الحرب",p:"al-harb",e:"The war",ctx:"Refers specifically to the ongoing war in Sudan. Changed everything for everyone.",ex:"الحرب غيّرت كل شيء في حياتنا.",exen:"The war changed everything in our lives.",cat:"Sudan",src:"v1",type:"Word"},
  {a:"التهجير",p:"at-tahjiir",e:"Displacement / forced migration",ctx:"What many Sudanese experienced — being forced to leave.",ex:"التهجير كان تجربة صعبة لكن فيها حكمة.",exen:"Displacement was a difficult experience but there's wisdom in it.",cat:"Sudan",src:"v2",type:"Word"},
  {a:"برّا",p:"barra",e:"Outside / abroad / out there",ctx:"Used to mean outside Sudan — or outside any place.",ex:"الناس اللي عايشين برّا بيمثلوننا.",exen:"The people living abroad represent us.",cat:"Sudan",src:"v1",type:"Word"},
  {a:"في الخارج",p:"fi al-khaarij",e:"Abroad / outside the country",ctx:"More formal version of برّا. Living and working internationally.",ex:"في ناس سودانيين في الخارج بيعملوا حاجات رهيبة.",exen:"There are Sudanese people abroad doing incredible things.",cat:"Sudan",src:"v2",type:"Phrase"},
  {a:"ثقافتنا",p:"thaqaaftna",e:"Our culture",ctx:"Used when referencing Sudanese cultural identity and traditions.",ex:"لازم نحافظ على ثقافتنا حتى في الخارج.",exen:"We must preserve our culture even abroad.",cat:"Sudan",src:"v2",type:"Word"},
  {a:"الهوية",p:"al-huwiyya",e:"Identity",ctx:"Who you are — culturally, personally, artistically.",ex:"الهوية السودانية قوية شديد.",exen:"Sudanese identity is very strong.",cat:"Sudan",src:"v2",type:"Word"},
  {a:"الأصول",p:"al-usool",e:"Roots / origins / heritage",ctx:"Your cultural origins and what you come from.",ex:"ما تنسى أصولك — دي قوتك.",exen:"Don't forget your roots — that's your strength.",cat:"Sudan",src:"v2",type:"Word"},
  // ── Advice & wisdom ──
  {a:"دكرني",p:"zakkrani",e:"It reminded me / it made me remember",ctx:"When something triggers a memory or realization.",ex:"كلامه دكّرني بأول ما بديت.",exen:"What he said reminded me of when I first started.",cat:"Wisdom",src:"v1",type:"Word"},
  {a:"استفدت",p:"istafadt",e:"I benefited / I gained / I learned from",ctx:"Used when reflecting on what you got from an experience.",ex:"استفدت كتير من التجربة دي.",exen:"I gained a lot from this experience.",cat:"Wisdom",src:"v1",type:"Word"},
  {a:"الدرس",p:"ad-dars",e:"The lesson / the takeaway",ctx:"What you learn from experience.",ex:"الدرس من القصة دي — ما تستعجل.",exen:"The lesson from this story — don't rush.",cat:"Wisdom",src:"v1",type:"Word"},
  {a:"تجربة",p:"tajriba",e:"An experience / an experiment",ctx:"Something you went through and learned from.",ex:"الفترة دي كانت تجربة صعبة لكن مفيدة.",exen:"That period was a difficult but useful experience.",cat:"Wisdom",src:"v1",type:"Word"},
  {a:"حكمة",p:"hikma",e:"Wisdom / a saying of wisdom",ctx:"Deep insight. Used for life lessons and proverbs.",ex:"في حكمة في قوله — الدنيا ما دوامة.",exen:"There's wisdom in what he said — what goes around comes around.",cat:"Wisdom",src:"p2",type:"Word"},
  {a:"الصبر",p:"as-sabr",e:"Patience",ctx:"One of the most valued qualities. Often paired with success.",ex:"الصبر مفتاح النجاح — ما في طريق تاني.",exen:"Patience is the key to success — there is no other way.",cat:"Wisdom",src:"v1",type:"Word"},
  {a:"الثقة بالنفس",p:"ath-thiqa bin-nafs",e:"Self-confidence / belief in yourself",ctx:"Trusting your own abilities and worth.",ex:"الثقة بالنفس حاجة بتيجي مع الوقت.",exen:"Self-confidence is something that comes with time.",cat:"Wisdom",src:"v2",type:"Phrase"},
  {a:"خلّي بالك",p:"khalli baalak",e:"Be careful / pay attention / watch out",ctx:"Used to warn or advise someone to be mindful.",ex:"خلّي بالك من الناس اللي ما بتعرفهم.",exen:"Be careful of people you don't know.",cat:"Wisdom",src:"v2",type:"Phrase"},
  {a:"استنّى",p:"istanna",e:"Wait / be patient / hold on",ctx:"Telling someone to slow down or wait before acting.",ex:"استنّى — ما تستعجل الأمور.",exen:"Wait — don't rush things.",cat:"Wisdom",src:"v1",type:"Word"},
  {a:"حسّن نفسك",p:"hassin nafsak",e:"Improve yourself / better yourself",ctx:"Self-improvement directive.",ex:"دايماً حسّن نفسك — ما توقف.",exen:"Always improve yourself — don't stop.",cat:"Wisdom",src:"v2",type:"Phrase"},
  // ── Praise & reactions ──
  {a:"يسلموا",p:"yislamu",e:"Well done / bless you / thank you (Sudanese praise)",ctx:"Said when someone does something good or gives you something.",ex:"يسلموا — الحفل كان رهيب.",exen:"Bless you — the show was incredible.",cat:"Praise",src:"v1",type:"Word"},
  {a:"ماشاء الله",p:"mashaa'allah",e:"God willed it — said in admiration / wow",ctx:"Expresses genuine admiration and attributes it to God's will.",ex:"ماشاء الله — الصوت بتاعه جميل شديد.",exen:"God willed it — his voice is very beautiful.",cat:"Praise",src:"v1",type:"Word"},
  {a:"برافو",p:"bravo",e:"Bravo / well done",ctx:"Italian loanword used naturally in Sudanese Arabic.",ex:"برافو عليك — الشغل رهيب.",exen:"Bravo — the work is incredible.",cat:"Praise",src:"v1",type:"Word"},
  {a:"عظيم",p:"3azeem",e:"Great / magnificent / tremendous",ctx:"Strong praise word. Used for things that are truly impressive.",ex:"الرحلة دي ستكون عظيمة.",exen:"This journey is going to be tremendous.",cat:"Praise",src:"v1",type:"Word"},
  {a:"فظيع",p:"fazee3",e:"Amazing / crazy good / insane (positive)",ctx:"Means 'terrible' literally but used ironically for something incredibly good.",ex:"الزول دا فظيع في شغله.",exen:"That person is insanely good at his work.",cat:"Praise",src:"v1",type:"Word"},
  {a:"جامد",p:"jaamid",e:"Solid / strong / really good",ctx:"Egyptian Arabic loanword used in Sudanese speech. Something is solid/great.",ex:"الكونتنت بتاعه جامد شديد.",exen:"His content is really solid.",cat:"Praise",src:"v2",type:"Word"},
  {a:"تستاهل",p:"tistaahil",e:"You deserve it / you're worth it",ctx:"Used to tell someone they earned what they have.",ex:"تستاهل كل النجاح دا — بتشتغل بجد.",exen:"You deserve all this success — you work hard.",cat:"Praise",src:"v1",type:"Word"},
  {a:"على مستوى عالي",p:"3ala mustawa 3aali",e:"On a high level / high quality",ctx:"Describes someone or something operating at a top tier.",ex:"شغله دايماً على مستوى عالي.",exen:"His work is always at a high level.",cat:"Praise",src:"v1",type:"Phrase"},
  // ── Frustration & difficulty ──
  {a:"صعبة",p:"sa3ba",e:"Difficult / hard (feminine)",ctx:"Describes a difficult situation, task, or phase.",ex:"الفترة دي صعبة شديد على كل الناس.",exen:"This period is very difficult for everyone.",cat:"Emotions",src:"v1",type:"Word"},
  {a:"تعبان",p:"ta3baan",e:"Tired / exhausted / struggling",ctx:"Physical or emotional exhaustion. 'He's tired from it all.'",ex:"تعبان من الضغط دا كله.",exen:"He's tired from all this pressure.",cat:"Emotions",src:"v2",type:"Word"},
  {a:"ضيّق",p:"dayyiq",e:"Narrow / tight / stressed out",ctx:"Describes a cramped feeling — physically or emotionally.",ex:"الظروف الضيّقة دي صعبة على النفسية.",exen:"These tight circumstances are hard on the mind.",cat:"Emotions",src:"v2",type:"Word"},
  {a:"مشكلة",p:"mushkila",e:"A problem / an issue",ctx:"A problem or challenge that needs addressing.",ex:"في مشكلة مع الصوت دايماً قبل الحفلة.",exen:"There's always a problem with the sound before the show.",cat:"Emotions",src:"v1",type:"Word"},
  {a:"ما طاقة",p:"ma taqa",e:"Can't stand it / unbearable / too much",ctx:"Used when something has become intolerable.",ex:"الهيت كومنتس دي ما طاقة.",exen:"These hate comments are unbearable.",cat:"Emotions",src:"v2",type:"Phrase"},
  {a:"زعلان",p:"za3laan",e:"Upset / disappointed / hurt",ctx:"Emotional hurt or disappointment.",ex:"زعلان من الطريقة اللي الأمور ماشيت بيها.",exen:"He's upset about the way things went.",cat:"Emotions",src:"v1",type:"Word"},
  {a:"محرج",p:"muharraj",e:"Embarrassed / in an awkward situation",ctx:"Used for embarrassing moments or uncomfortable situations.",ex:"كنت محرج شديد في الموقف دا.",exen:"I was really embarrassed in that situation.",cat:"Emotions",src:"v1",type:"Word"},
  // ── Key verbs ──
  {a:"بنتلاقى",p:"binitlaaqaa",e:"We meet up / we get together",ctx:"Meeting or getting together with someone.",ex:"أخيراً قدرنا نتلاقى في الحلقة دي.",exen:"We finally managed to meet up in this episode.",cat:"Actions",src:"v1",type:"Word"},
  {a:"بيبيّن",p:"biyibayyin",e:"It shows / it appears / it becomes clear",ctx:"When something reveals itself or becomes evident.",ex:"الإخلاص بيبيّن في المواقف مش في الكلام.",exen:"Sincerity shows in moments not in words.",cat:"Actions",src:"v1",type:"Word"},
  {a:"بيخليني",p:"biykhalliini",e:"It makes me / it causes me to",ctx:"Causative — 'this thing makes me feel...'",ex:"كلامه بيخليني أفكر كتير.",exen:"What he says makes me think a lot.",cat:"Actions",src:"v2",type:"Word"},
  {a:"بحاول",p:"bihaawil",e:"I try / I attempt",ctx:"Expresses effort or intention.",ex:"بحاول دايماً أكون على طبيعتي.",exen:"I always try to be in my natural state.",cat:"Actions",src:"v2",type:"Word"},
  {a:"بشوف",p:"bashoof",e:"I see / I observe / I watch",ctx:"Not just physical seeing — also means 'I notice' or 'I view it as.'",ex:"بشوف إنو الموضوع أكبر من كده.",exen:"I see that the matter is bigger than this.",cat:"Actions",src:"v1",type:"Word"},
  {a:"بتمشي",p:"bitmishi",e:"It goes / it works / it moves forward",ctx:"When something is progressing or functioning.",ex:"الموضوع بتمشي — الحمد لله.",exen:"Things are moving — praise God.",cat:"Actions",src:"v1",type:"Word"},

let tipIdx=0;

function shuf(a){let b=[...a];for(let i=b.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}

function getSrc(){
  if(src==='v1') return shuf([...V1,...EXTRA.filter(x=>x.src==='v1')]);
  if(src==='v2') return shuf([...V2,...EXTRA.filter(x=>x.src==='v2')]);
  if(src==='p2') return shuf([...P2,...EXTRA.filter(x=>x.src==='p2')]);
  if(src==='extra') return shuf(EXTRA);
  return shuf([...V1,...V2,...EXTRA]);
}

function getVocabChips(count=6){
  const pool=getSrc();
  const shuffled=shuf(pool).slice(0,count);
  return shuffled;
}

function updStats(){
  const tot=deck.length;
  document.getElementById('s-k').textContent=knowSet.size;
  document.getElementById('s-l').textContent=learnSet.size;
  document.getElementById('s-t').textContent=tot;
  const p=tot?Math.round(((knowSet.size+learnSet.size)/tot)*100):0;
  document.getElementById('s-p').textContent=p+'%';
  document.getElementById('prog').style.width=p+'%';
  document.getElementById('top-counter').textContent=`${idx+1} / ${tot}`;
}

function tagH(it){
  const srcCls=it.src==='v1'?'tag-v1':it.src==='v2'?'tag-v2':'tag-p2';
  const srcLbl=it.src==='v1'?'Video 1':it.src==='v2'?'Video 2':'Glossary';
  return `<div class="tags"><span class="tag ${srcCls}">${srcLbl}</span><span class="tag tag-cat">${it.cat}</span><span class="tag tag-type">${it.type}</span></div>`;
}

function vocabPanelHTML(chips){
  usedVocabChips=new Set();
  return `<div class="vocab-panel">
    <div class="vocab-panel-title">
      <span>Vocab toolkit — click to mark used</span>
      <button class="vocab-refresh" onclick="refreshVocabPanel()">Shuffle</button>
    </div>
    <div class="vocab-chips" id="vocab-chips">
      ${chips.map((c,i)=>`<div class="vocab-chip" id="vc-${i}" onclick="toggleChip(${i})">
        <span class="chip-ar">${c.a}</span>
        <span class="chip-en">${c.e.split('/')[0].trim()}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

let currentVocabChips=[];

function refreshVocabPanel(){
  currentVocabChips=getVocabChips(6);
  const el=document.getElementById('vocab-chips');
  if(el){
    el.innerHTML=currentVocabChips.map((c,i)=>`<div class="vocab-chip" id="vc-${i}" onclick="toggleChip(${i})">
      <span class="chip-ar">${c.a}</span>
      <span class="chip-en">${c.e.split('/')[0].trim()}</span>
    </div>`).join('');
  }
}

function toggleChip(i){
  const el=document.getElementById('vc-'+i);
  if(!el)return;
  if(usedVocabChips.has(i)){usedVocabChips.delete(i);el.classList.remove('used');}
  else{usedVocabChips.add(i);el.classList.add('used');}
}

function streakHTML(){
  if(!streak.length||mode==='ref') return '';
  return `<div class="streak-row">${streak.slice(-20).map(s=>`<div class="dot ${s?'ok':'no'}"></div>`).join('')}</div>`;
}

function tipHTML(){
  if(mode==='ref') return '';
  return `<div class="tip-bar"><span class="tip-label">Tip</span><span>${tips[tipIdx%tips.length]}</span></div>`;
}

// ── Modes ──
function setSrc(s){
  src=s;
  ['v1','v2','all','p2','extra'].forEach(x=>{
    const el=document.getElementById('src-'+x);
    if(el) el.className='src-btn'+(x===s?' on-'+s:'');
  });
  deck=getSrc();idx=0;flipped=false;mcAns=false;revShown=false;
  deepDeck=[];deepIdx=0;
  knowSet.clear();learnSet.clear();streak=[];usedVocabChips=new Set();
  updStats();render();
}

function setMode(m){
  mode=m;
  ['flash','deep','shadow','mc','build','flow','speak','ref','trans','vocab','deepquiz','convo','starred'].forEach(x=>{
    const el=document.getElementById('nav-'+x);
    if(el) el.className='nav-btn'+(x===m?' on':'');
  });
  const titles={flash:'Flashcards',deep:'Deep cards + synonyms',shadow:'Shadowing',mc:'Quiz',build:'Sentence builder',flow:'Flow translation',speak:'Speak & respond',ref:'Full reference',trans:'Transitions guide',vocab:'Vocab lists',deepquiz:'Deep quiz',convo:'Conversation mode',starred:'Starred items'};
  document.getElementById('top-title').textContent=titles[m]||m;
  deck=getSrc();idx=0;flipped=false;mcAns=false;revShown=false;
  deepDeck=[];deepIdx=0;
  knowSet.clear();learnSet.clear();streak=[];usedVocabChips=new Set();shadowArHidden=true;buildArHidden=true;
  updStats();tipIdx++;
  // Show intro screen first time for each mode
  if(!introShown[m]){ renderIntro(m); return; }
  render();
}

function render(){
  if(mode==='ref'){renderRef();return;}
  if(mode==='shadow'){renderShadow();return;}
  if(mode==='mc'){renderMC();return;}
  if(mode==='build'){renderBuild();return;}
  if(mode==='flow'){renderFlow();return;}
  if(mode==='speak'){renderSpeak();return;}
  if(mode==='trans'){renderTrans();return;}
  if(mode==='vocab'){renderVocabList();return;}
  if(mode==='deepquiz'){renderDeepQuiz();return;}
  if(mode==='convo'){renderConvo();return;}
  if(mode==='deep'){renderDeepCards();return;}
  if(mode==='starred'){renderStarred();return;}
  renderFlash();
}


function setFlashDir(dir){
  flashDir=dir;
  flipped=false;
  renderFlash();
}

function navCard(dir){
  const newIdx=idx+dir;
  if(newIdx<0||newIdx>=deck.length)return;
  idx=newIdx;
  flipped=false;
  updStats();renderFlash();
}

function flip(){
  if(document.getElementById('flipper').classList.contains('flipped')){
    document.getElementById('flipper').classList.remove('flipped');
    flipped=false;
    setTimeout(()=>renderFlash(),520);
  } else {
    document.getElementById('flipper').classList.add('flipped');
    flipped=true;
    setTimeout(()=>renderFlash(),20);
  }
}

// ── Reference ──
function renderRef(){
  const ca=document.getElementById('content-area');
  const all=[...V1,...V2,...P2,...EXTRA];
  const cats=['All',...new Set(all.map(x=>x.cat))].sort();
  let filtered=all;
  if(refFilt==='All'){}
  else if(refFilt==='Video 1')filtered=all.filter(x=>x.src==='v1');
  else if(refFilt==='Video 2')filtered=all.filter(x=>x.src==='v2');
  else if(refFilt==='Glossary')filtered=all.filter(x=>x.src==='p2');
  else filtered=all.filter(x=>x.cat===refFilt);

  const byCat={};
  filtered.forEach(it=>{if(!byCat[it.cat])byCat[it.cat]=[];byCat[it.cat].push(it);});

  const filterOpts=[...cats,'Video 1','Video 2','Glossary'];
  let html=`<div class="ref-filters">${filterOpts.map(c=>`<button class="ref-filter ${refFilt===c?'on':''}" onclick="setFilt('${c}')">${c}</button>`).join('')}</div>`;

  Object.keys(byCat).sort().forEach(cat=>{
    html+=`<div class="ref-cat-head">${cat}</div>`;
    byCat[cat].forEach(it=>{
      const sc=it.src==='v1'?'tag-v1':it.src==='v2'?'tag-v2':'tag-p2';
      const sl=it.src==='v1'?'V1':it.src==='v2'?'V2':'P2';
      html+=`<div class="ref-item">
        <div class="ref-header">
          <span class="tag ${sc}" style="font-size:10px">${sl}</span>
          <span class="ref-ar">${it.a}</span>
          <span class="ref-ph">${it.p}</span>
        </div>
        <div class="ref-en">${it.e}</div>
        <div class="ref-ctx">${it.ctx}</div>
        <div class="ex-block" style="font-size:12px;margin-top:8px">${it.ex}<div class="ex-en">${it.exen}</div></div>
      </div>`;
    });
  });

  ca.innerHTML=html;
  document.getElementById('top-counter').textContent=`${filtered.length} items`;
}

function setFilt(f){refFilt=f;renderRef();}

// ── Result ──
function renderResult(){
  const t=knowSet.size+learnSet.size;
  const p=t?Math.round((knowSet.size/t)*100):0;
  document.getElementById('content-area').innerHTML=`
    <div class="result-area">
      <div class="result-pct">${p}%</div>
      <div class="result-sub">Got ${knowSet.size} right out of ${t} attempted · ${deck.length-t} not yet tried</div>
      <div class="result-bar"><div class="result-bar-fill" style="width:${p}%"></div></div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn" onclick="restart(false)">Restart full deck</button>
        <button class="btn btn-almost" onclick="restart(true)">Review missed only</button>
        <button class="btn btn-got" onclick="setSrc('${src}')">New shuffle</button>
      </div>
    </div>
  `;
}

// ── Actions ──
function showRev(){revShown=true;render();}

function mark(know){
  streak.push(know);
  const it=deck[idx];
  if(know)knowSet.add(it.a);else learnSet.add(it.a);
  idx++;flipped=false;revShown=false;mcAns=false;usedVocabChips=new Set();shadowArHidden=true;buildArHidden=true;
  updStats();
  if(idx>0&&idx%8===0)tipIdx++;
  render();
}

function chkMC(i,correct){
  if(mcAns)return;
  mcAns=true;
  const it=deck[idx];
  mcOpts.forEach((o,j)=>{
    const btn=document.getElementById('mc'+j);
    if(o.e===it.e)btn.classList.add('correct');
    else if(j===i&&!correct)btn.classList.add('wrong');
  });
  streak.push(correct);
  if(correct)knowSet.add(it.a);else learnSet.add(it.a);
  updStats();render();
}

function nxtMC(){idx++;mcAns=false;render();}

function restart(missedOnly){
  let pool=getSrc();
  if(missedOnly){pool=pool.filter(x=>learnSet.has(x.a));if(!pool.length)pool=getSrc();}
  deck=pool;idx=0;flipped=false;revShown=false;mcAns=false;
  knowSet.clear();learnSet.clear();streak=[];usedVocabChips=new Set();
  updStats();render();
}

// ── Flow state ──
let flowSetIdx=0, flowAllRevealed=false;
// ── Speak state ──
let speakQIdx=0, speakRevealed=false, speakUsedChips=new Set();

// ── Render: Flow Translation ──
function renderFlow(){
  const ca=document.getElementById('content-area');
  const set=FLOW_SETS[flowSetIdx];
  const allSets=FLOW_SETS.length;

  ca.innerHTML=`
    ${tipHTML()}
    <div class="flow-set-nav">
      <button class="arrow-btn" onclick="navFlow(-1)" ${flowSetIdx===0?'disabled':''}>←</button>
      <span class="flow-set-counter">Set ${flowSetIdx+1} of ${allSets}</span>
      <button class="arrow-btn" onclick="navFlow(1)" ${flowSetIdx>=allSets-1?'disabled':''}>→</button>
    </div>
    <div class="flow-set-meta">
      <div class="flow-set-topic">${set.topic}</div>
      <div class="flow-set-title">${set.title}</div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-bottom:16px">
      <button class="flow-reveal-all-btn" onclick="revealAllFlow()">Reveal all</button>
      <button class="flow-reveal-all-btn" onclick="hideAllFlow()">Hide all</button>
    </div>
    <div id="flow-sentences">
      ${set.sentences.map((s,i)=>`
        <div class="flow-sentence-block" id="fsb-${i}">
          <div class="flow-sentence-header" onclick="toggleFlowSentence(${i})">
            <span class="flow-sentence-num">${i+1}</span>
            <span class="flow-en-text">${s.en}</span>
            <span class="flow-reveal-icon" id="ficon-${i}">▾</span>
          </div>
          <div class="flow-arabic-reveal" id="far-${i}">
            <div class="flow-ar-text">${s.ar}</div>
            <div class="flow-ph-text">${s.ph}</div>
            <div class="flow-note">${s.note}</div>
            <div class="flow-vocab-required">
              ${s.vocab.map(v=>`<span class="flow-vocab-tag">${v}</span>`).join('')}
            </div>
          </div>
        </div>
      `).join('')}
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:20px">
      <button class="btn btn-accent" onclick="navFlow(1)" ${flowSetIdx>=allSets-1?'disabled':''}>Next set →</button>
    </div>
  `;
}

function toggleFlowSentence(i){
  const el=document.getElementById('far-'+i);
  const icon=document.getElementById('ficon-'+i);
  const isOpen=el.classList.contains('show');
  el.classList.toggle('show',!isOpen);
  icon.classList.toggle('open',!isOpen);
}

function revealAllFlow(){
  FLOW_SETS[flowSetIdx].sentences.forEach((_,i)=>{
    document.getElementById('far-'+i)?.classList.add('show');
    document.getElementById('ficon-'+i)?.classList.add('open');
  });
}

function hideAllFlow(){
  FLOW_SETS[flowSetIdx].sentences.forEach((_,i)=>{
    document.getElementById('far-'+i)?.classList.remove('show');
    document.getElementById('ficon-'+i)?.classList.remove('open');
  });
}

function navFlow(dir){
  const newIdx=flowSetIdx+dir;
  if(newIdx<0||newIdx>=FLOW_SETS.length)return;
  flowSetIdx=newIdx;
  renderFlow();
}

// ── Render: Speak & Respond ──
function renderSpeak(){
  const ca=document.getElementById('content-area');
  const q=SPEAK_QA[speakQIdx];
  const total=SPEAK_QA.length;

  const allItems=getSrc();
  const bonusItems=shuf(allItems.filter(x=>!q.required.includes(x.a))).slice(0,4);
  const requiredItems=q.required.map(r=>{
    const found=[...V1,...V2,...P2].find(x=>x.a===r||x.a.startsWith(r));
    return found||{a:r,p:'',e:'',src:'v1'};
  });

  const chipItems=[
    ...requiredItems.map(x=>({...x,_req:true})),
    ...bonusItems.map(x=>({...x,_req:false})),
  ];

  ca.innerHTML=`
    ${tipHTML()}
    <div class="speak-q-nav">
      <button class="arrow-btn" onclick="navSpeak(-1)" ${speakQIdx===0?'disabled':''}>←</button>
      <span class="speak-q-counter">Question ${speakQIdx+1} of ${total}</span>
      <button class="arrow-btn" onclick="navSpeak(1)" ${speakQIdx>=total-1?'disabled':''}>→</button>
    </div>

    <div class="speak-question-card">
      <div class="speak-q-label">Speak &amp; respond</div>
      <div class="speak-question-en">${q.qen}</div>
      <div class="speak-question-ar">${q.qar}</div>
      <div class="speak-prompt-note">${q.context}</div>
    </div>

    <div class="speak-vocab-panel">
      <div class="speak-vocab-title">
        <span>Use these words — dashed border = required</span>
        <button class="vocab-refresh" onclick="renderSpeak()">Refresh</button>
      </div>
      <div class="speak-chip-grid">
        ${chipItems.map((c,i)=>`
          <div class="speak-chip ${c._req?'required':''}" id="sc-${i}" onclick="toggleSpeakChip(${i})">
            <div class="speak-chip-ar">${c.a}</div>
            ${c.p?`<div class="speak-chip-ph">${c.p}</div>`:''}
            <div class="speak-chip-en">${c.e.split('/')[0].trim()}</div>
          </div>
        `).join('')}
      </div>
    </div>

    <div class="speak-model-answer">
      <div class="speak-model-body">
        <div class="speak-model-label">Your turn — speak for 30–60 seconds, then reveal model answer</div>
        <div class="reveal-area ${speakRevealed?'show':''}" id="speak-rev">
          <div class="speak-model-label" style="margin-top:4px;margin-bottom:12px">Model answer (3 sentences)</div>
          <div class="speak-model-lines">
            ${q.model.map((line,i)=>`
              <div class="speak-model-line">
                <div class="speak-line-ar">${line.ar}</div>
                <div class="speak-line-ph">${line.ph}</div>
                <div class="speak-line-en">${line.en}</div>
                <div class="speak-line-vocab">${line.vocab.map(v=>`<span class="speak-line-vword">${v}</span>`).join('')}</div>
              </div>
            `).join('')}
          </div>
          <div class="speak-tip-box"><strong>Speaking tip:</strong> ${q.tip}</div>
        </div>
      </div>
      <div class="mode-card-footer">
        ${!speakRevealed
          ?`<button class="btn btn-accent" onclick="revealSpeak()">Show model answer</button>`
          :`<button class="btn" onclick="navSpeak(1)" ${speakQIdx>=total-1?'disabled':''}>Next question →</button>
            <button class="btn btn-got" onclick="navSpeak(1)" ${speakQIdx>=total-1?'disabled':''}>That was good!</button>`
        }
      </div>
    </div>
  `;
}

function toggleSpeakChip(i){
  const el=document.getElementById('sc-'+i);
  if(!el)return;
  if(speakUsedChips.has(i)){speakUsedChips.delete(i);el.classList.remove('used');}
  else{speakUsedChips.add(i);el.classList.add('used');}
}

function revealSpeak(){speakRevealed=true;renderSpeak();}

function navSpeak(dir){
  const newIdx=speakQIdx+dir;
  if(newIdx<0||newIdx>=SPEAK_QA.length)return;
  speakQIdx=newIdx;
  speakRevealed=false;
  speakUsedChips=new Set();
  renderSpeak();
}

// DEEP QUIZ DATA & ENGINE
// ══════════════════════════════════════
let dqType='mixed', dqIdx=0, dqScore=0, dqTotal=0, dqAns=false, dqQuestions=[], dqAssembly=[];

const DQ_TYPES = [
  {id:'mixed',label:'Mixed drill',desc:'All question types in randomized order. Best for overall retention.'},
  {id:'mc4',label:'4-choice recognition',desc:'See Arabic, pick English. Builds recognition speed through forced choice.'},
  {id:'produce',label:'English → Arabic production',desc:'See English, recall the Arabic. Hardest mode — builds real output skill.'},
  {id:'context',label:'Context cloze',desc:'A sentence with a gap. Pick the right word from 4 options. Builds grammar sense.'},
  {id:'arrange',label:'Word order',desc:'Arrange scrambled Arabic words into a correct sentence. Builds grammar feel.'},
];

function buildDQQuestions(){
  const all=[...V1,...V2,...P2,...EXTRA].filter(x=>x.a&&x.e&&x.ex);
  const shuffled=shuf(all);
  const types=['mc4','produce','context','arrange'];
  return shuffled.slice(0,20).map((item,i)=>{
    const type = dqType==='mixed' ? types[i%types.length] : dqType;
    return {item, type};
  });
}

function renderDeepQuiz(){
  const ca=document.getElementById('content-area');
  if(dqQuestions.length===0){
    ca.innerHTML=`
      <div class="tip-bar"><span class="tip-label">Research note</span><span>These quiz types are based on spaced repetition (SR), retrieval practice, interleaving, and production-first principles — the fastest evidence-backed methods for language acquisition.</span></div>
      <div class="dq-mode-row">
        ${DQ_TYPES.map(t=>`<button class="dq-mode-card ${dqType===t.id?'active':''}" onclick="setDQType('${t.id}')">
          <div class="dq-mode-title">${t.label}</div>
          <div class="dq-mode-desc">${t.desc}</div>
        </button>`).join('')}
      </div>
      <div style="display:flex;justify-content:center;margin-top:8px">
        <button class="btn btn-accent" style="padding:12px 32px;font-size:14px" onclick="startDQ()">Start drill →</button>
      </div>`;
    return;
  }
  if(dqIdx>=dqQuestions.length){
    renderDQResult(); return;
  }
  const {item,type}=dqQuestions[dqIdx];
  let html='';
  if(type==='mc4') html=renderDQMC4(item);
  else if(type==='produce') html=renderDQProduce(item);
  else if(type==='context') html=renderDQContext(item);
  else if(type==='arrange') html=renderDQArrange(item);
  ca.innerHTML=`
    <div class="dq-question-card">
      <div class="dq-q-body">${html}</div>
      <div class="dq-footer">
        <span class="dq-score">${dqIdx+1} / ${dqQuestions.length} · Score: ${dqScore}</span>
        <div class="dq-streak-dots">${dqQuestions.slice(0,dqIdx).map((_,i)=>`<div class="dot ${i<dqScore?'ok':'no'}"></div>`).join('')}</div>
      </div>
    </div>`;
}

function renderDQMC4(item){
  const pool=shuf([...V1,...V2,...P2,...EXTRA].filter(x=>x.e!==item.e)).slice(0,3);
  const opts=shuf([item,...pool]);
  return `<div class="dq-q-type">4-choice recognition</div>
    <div class="dq-q-arabic">${item.a}</div>
    <div class="dq-q-hint">${item.p}</div>
    <div class="dq-opts">
      ${opts.map((o,i)=>`<button class="dq-opt dq-opt-en" id="dqo${i}" onclick="checkDQMC(${i},${o.e===item.e},'${encodeURIComponent(item.e)}','${encodeURIComponent(item.ctx)}')">${o.e}</button>`).join('')}
    </div>`;
}

function renderDQProduce(item){
  return `<div class="dq-q-type">English → Arabic production</div>
    <div class="dq-q-text">${item.e}</div>
    <div class="dq-q-hint">Say or write the Arabic phrase. Then check yourself.</div>
    <div class="reveal-area ${dqAns?'show':''}" id="dq-rev">
      <div class="dq-q-arabic" style="margin-top:12px">${item.a}</div>
      <div style="font-size:12px;color:var(--purple);font-style:italic;margin-bottom:8px">${item.p}</div>
      <div class="dq-feedback-exp">${item.ctx}</div>
      <div class="ex-block" style="margin-top:10px;font-size:13px">${item.ex}<div class="ex-en">${item.exen}</div></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:14px">
      ${!dqAns
        ?`<button class="btn btn-accent" onclick="revealDQProduce()">Check answer</button>`
        :`<button class="btn btn-learn" onclick="scoreDQ(false)">Got it wrong</button>
          <button class="btn btn-got" onclick="scoreDQ(true)">Got it right</button>`
      }
    </div>`;
}

function renderDQContext(item){
  const sentence=item.ex;
  const blank='______';
  const blankSentence=sentence.replace(item.a.split(' ').slice(0,2).join(' '),blank);
  const pool=shuf([...V1,...V2,...P2,...EXTRA].filter(x=>x.a!==item.a)).slice(0,3);
  const opts=shuf([item,...pool]);
  return `<div class="dq-q-type">Context cloze — fill the blank</div>
    <div class="dq-q-arabic">${blankSentence}</div>
    <div class="dq-q-hint">${item.exen}</div>
    <div class="dq-opts">
      ${opts.map((o,i)=>`<button class="dq-opt" id="dqo${i}" onclick="checkDQMC(${i},${o.a===item.a},'${encodeURIComponent(item.a)}','${encodeURIComponent(item.ctx)}')">${o.a.split(' ').slice(0,3).join(' ')}</button>`).join('')}
    </div>`;
}

function renderDQArrange(item){
  const words=item.a.split(' ');
  if(words.length<3) return renderDQMC4(item);
  const scrambled=shuf(words);
  dqAssembly=[];
  const chipsHTML=scrambled.map((w,i)=>`<div class="dq-word-chip" id="wc${i}" onclick="addWord('${encodeURIComponent(w)}',${i},'${encodeURIComponent(item.a)}')">${w}</div>`).join('');
  return `<div class="dq-q-type">Word order — arrange the sentence</div>
    <div class="dq-q-hint" style="margin-bottom:8px">${item.e}</div>
    <div class="dq-q-hint">${item.exen}</div>
    <div class="dq-arrange">${chipsHTML}</div>
    <div style="font-size:11px;color:var(--text3);margin:8px 0 4px">Your sentence (click words above, click below to remove):</div>
    <div class="dq-assembly" id="dq-assembly"><span class="dq-assembly-hint">tap words above</span></div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:12px">
      <button class="btn" onclick="clearAssembly()">Clear</button>
      <button class="btn btn-accent" onclick="checkArrange('${encodeURIComponent(item.a)}','${encodeURIComponent(item.ctx)}')">Check</button>
    </div>`;
}

function setDQType(t){dqType=t;dqQuestions=[];dqIdx=0;dqScore=0;dqAns=false;renderDeepQuiz();}
function startDQ(){dqQuestions=buildDQQuestions();dqIdx=0;dqScore=0;dqAns=false;dqAssembly=[];renderDeepQuiz();}

function checkDQMC(i,correct,ansEnc,ctxEnc){
  if(dqAns) return;
  dqAns=true;
  const ans=decodeURIComponent(ansEnc);
  const ctx=decodeURIComponent(ctxEnc);
  document.querySelectorAll('[id^="dqo"]').forEach((btn,j)=>{
    if(j===i) btn.classList.add(correct?'correct':'wrong');
    const btnText=btn.textContent.trim();
    if(btnText===ans||btn.textContent===ans) btn.classList.add('correct');
  });
  if(correct) dqScore++;
  const fb=document.createElement('div');
  fb.className='dq-feedback';
  fb.innerHTML=`<div class="${correct?'dq-feedback-correct':'dq-feedback-wrong'}">${correct?'Correct!':'Not quite.'}</div><div class="dq-feedback-exp">${ctx}</div>`;
  document.querySelector('.dq-q-body').appendChild(fb);
  const footer=document.querySelector('.dq-footer');
  if(footer){
    const nextBtn=document.createElement('button');
    nextBtn.className='btn btn-accent';nextBtn.textContent='Next →';
    nextBtn.onclick=()=>{dqIdx++;dqAns=false;dqAssembly=[];renderDeepQuiz();};
    footer.appendChild(nextBtn);
  }
}

function revealDQProduce(){dqAns=true;renderDeepQuiz();}
function scoreDQ(correct){if(correct)dqScore++;dqIdx++;dqAns=false;dqAssembly=[];renderDeepQuiz();}

function addWord(wordEnc,chipIdx,targetEnc){
  const w=decodeURIComponent(wordEnc);
  const chip=document.getElementById('wc'+chipIdx);
  if(chip&&chip.classList.contains('selected'))return;
  if(chip)chip.classList.add('selected');
  dqAssembly.push({w,chipIdx});
  const assembly=document.getElementById('dq-assembly');
  if(assembly){
    assembly.innerHTML='';
    dqAssembly.forEach((entry,i)=>{
      const el=document.createElement('div');
      el.className='dq-assembled-word';el.textContent=entry.w;
      el.onclick=()=>removeWord(i,entry.chipIdx);
      assembly.appendChild(el);
    });
  }
}

function removeWord(assemblyIdx,chipIdx){
  dqAssembly.splice(assemblyIdx,1);
  const chip=document.getElementById('wc'+chipIdx);
  if(chip)chip.classList.remove('selected');
  const assembly=document.getElementById('dq-assembly');
  if(assembly){
    assembly.innerHTML='';
    if(dqAssembly.length===0){assembly.innerHTML='<span class="dq-assembly-hint">tap words above</span>';return;}
    dqAssembly.forEach((entry,i)=>{
      const el=document.createElement('div');
      el.className='dq-assembled-word';el.textContent=entry.w;
      el.onclick=()=>removeWord(i,entry.chipIdx);
      assembly.appendChild(el);
    });
  }
}

function clearAssembly(){
  dqAssembly=[];
  document.querySelectorAll('.dq-word-chip').forEach(c=>c.classList.remove('selected'));
  const assembly=document.getElementById('dq-assembly');
  if(assembly)assembly.innerHTML='<span class="dq-assembly-hint">tap words above</span>';
}

function checkArrange(targetEnc,ctxEnc){
  const target=decodeURIComponent(targetEnc);
  const ctx=decodeURIComponent(ctxEnc);
  const attempt=dqAssembly.map(e=>e.w).join(' ');
  const correct=attempt.trim()===target.trim();
  if(correct)dqScore++;
  const ca=document.getElementById('content-area');
  const body=ca.querySelector('.dq-q-body');
  const fb=document.createElement('div');
  fb.className='dq-feedback';
  fb.innerHTML=`<div class="${correct?'dq-feedback-correct':'dq-feedback-wrong'}">${correct?'Perfect order!':'Not quite — the correct sentence:'}</div>
    ${!correct?`<div class="dq-q-arabic" style="font-size:17px;margin:6px 0">${target}</div>`:''}
    <div class="dq-feedback-exp">${ctx}</div>`;
  body.appendChild(fb);
  const footer=ca.querySelector('.dq-footer');
  if(footer){
    const nextBtn=document.createElement('button');
    nextBtn.className='btn btn-accent';nextBtn.textContent='Next →';
    nextBtn.onclick=()=>{dqIdx++;dqAns=false;dqAssembly=[];renderDeepQuiz();};
    footer.appendChild(nextBtn);
  }
}

function renderDQResult(){
  const pct=Math.round((dqScore/dqQuestions.length)*100);
  const msgs={90:'Native-level recall. You\'re internalizing this.',70:'Strong — a few gaps, hit those in the next round.',50:'Good foundation. Repeat the drill to cement it.',0:'Keep going. Retrieval practice works best over multiple sessions.'};
  const msgKey=Object.keys(msgs).reverse().find(k=>pct>=parseInt(k));
  document.getElementById('content-area').innerHTML=`
    <div class="dq-result">
      <div class="dq-result-pct">${pct}%</div>
      <div class="dq-result-label">${dqScore} / ${dqQuestions.length} correct</div>
      <div class="dq-result-msg">${msgs[msgKey]}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn" onclick="dqQuestions=[];dqIdx=0;dqScore=0;dqAns=false;renderDeepQuiz()">Change type</button>
        <button class="btn btn-almost" onclick="startDQ()">New drill</button>
        <button class="btn btn-got" onclick="startDQ()">Drill again</button>
      </div>
    </div>`;
}

function setTransFilter(f){transFilter=f;renderTrans();}
function toggleTransCard(key){
  transOpenCards[key]=!transOpenCards[key];
  const body=document.getElementById('tc-'+key);
  if(body) body.classList.toggle('show',!!transOpenCards[key]);
  const icon=body?.previousElementSibling?.querySelector('.trans-toggle-icon');
  if(icon) icon.classList.toggle('open',!!transOpenCards[key]);
}

      {speaker:"guest",ar:"كنت في البيت الولد المختلف — لو في شنو برّا، في شنو موضة — بكون أنا أول زول استلمت الحاجة دي.",ph:"kunt fi al-bayt al-walad al-mukhtalif — lau fi shinoo barra, fi shinoo moda — bakoon ana awwal zool istalamtu al-haga di.",en:"I was the different kid at home — if there is something new outside a trend — I would be the first person to receive that thing.",note:"الولد المختلف = the different kid. أول زول = the first person. Self-portrait of early curiosity and distinctiveness.",vocab:["الولد المختلف", "برّا", "أول زول"]},
      {speaker:"guest",ar:"الطفل صعب الإرضاء — فاهمه؟ ده دايماً أنا — وده دايماً أنا.",ph:"at-tifl sa3b al-irda — faahimuh? da dayiman ana — w-da dayiman ana.",en:"The child hard to please — you understand? That is always me — and that is always me.",note:"صعب الإرضاء = hard to please. Repeated for emphasis. He owns this characteristic.",vocab:["صعب الإرضاء", "فاهمه؟", "دايماً أنا"]},
      {speaker:"guest",ar:"دايماً شلّتي صغيرة — دايماً السيركل بتاعتي صغيرة — دايماً أصحابي محدودين — دايماً كده.",ph:"dayiman shalliti saghiira — dayiman as-circle bata3ti saghiira — dayiman ashaabi mahduudiin — dayiman kida.",en:"My group was always small — my circle was always small — my friends were always limited — always like this.",note:"السيركل بتاعتي = my circle. Four times دايماً for rhythm. Pride in a small tight circle.",vocab:["السيركل بتاعتي", "محدودين", "دايماً"]},

// ── Conversation mode state ──
let convoSceneIdx = 0;
let convoMode = 'full'; // 'full' = read whole scene | 'respond' = line-by-line respond mode
let convoRevealedLines = new Set();
let convoUsedChips = new Set();

function renderConvo() {
  const ca = document.getElementById('content-area');
  ca.innerHTML = `
    <div class="convo-intro">
      <div class="convo-intro-title">Conversation mode — Wansa × Solja</div>
      <div class="convo-intro-body">Read, shadow, and respond like the real speakers. Every scene is pulled directly from the transcript. Choose your practice mode then work through each scene until you can say every line naturally at speed.</div>
    </div>
    <div class="convo-mode-selector">
      <div class="convo-mode-card ${convoMode==='full'?'active':''}" onclick="setConvoMode('full')">
        <div class="convo-mode-title">Full scene read</div>
        <div class="convo-mode-desc">See the full conversation. Blur lines until you tap to reveal. Practice shadowing at speed.</div>
      </div>
      <div class="convo-mode-card ${convoMode==='respond'?'active':''}" onclick="setConvoMode('respond')">
        <div class="convo-mode-title">Respond mode</div>
        <div class="convo-mode-desc">Host line shown. You try to say what comes next. Tap to reveal the response with vocab chips.</div>
      </div>
    </div>
    <div class="convo-scene-tabs">
      ${CONVO_SCENES.map((sc,i) => `<button class="convo-tab ${convoSceneIdx===i?'on':''}" onclick="goConvoScene(${i})">${i+1}. ${sc.scene.split('—')[0].trim()}</button>`).join('')}
    </div>
    ${renderConvoScene()}
  `;
}

function setConvoMode(m) { convoMode = m; convoRevealedLines = new Set(); convoUsedChips = new Set(); renderConvo(); }
function goConvoScene(i) { convoSceneIdx = i; convoRevealedLines = new Set(); convoUsedChips = new Set(); renderConvo(); }

function renderConvoScene() {
  const scene = CONVO_SCENES[convoSceneIdx];
  const total = CONVO_SCENES.length;
  return `
    <div class="convo-scene-meta">
      <div class="convo-scene-label">Scene ${convoSceneIdx+1} of ${total}</div>
      <div class="convo-scene-title">${scene.scene}</div>
      <div class="convo-scene-desc">${scene.desc}</div>
    </div>
    <div class="convo-controls">
      <button class="convo-ctrl-btn" onclick="revealAllConvo()">Reveal all lines</button>
      <button class="convo-ctrl-btn" onclick="hideAllConvo()">Hide all</button>
      <span style="font-size:12px;color:var(--text3);margin-left:auto">Tap any line to reveal · tap again to hide</span>
    </div>
    <div class="convo-thread">
      ${convoMode === 'full' ? renderFullScene(scene) : renderRespondScene(scene)}
    </div>
    <div class="convo-nav">
      <button class="arrow-btn" onclick="navConvo(-1)" ${convoSceneIdx===0?'disabled':''}>← prev scene</button>
      <span class="convo-progress-label">${convoSceneIdx+1} / ${total}</span>
      <button class="arrow-btn" onclick="navConvo(1)" ${convoSceneIdx>=total-1?'disabled':''}>next scene →</button>
    </div>
  `;
}

function renderFullScene(scene) {
  return scene.lines.map((line, i) => {
    const revealed = convoRevealedLines.has(i);
    const isHost = line.speaker === 'host';
    const vocabChips = line.vocab.map((v,vi) => `<span class="convo-vc" onclick="event.stopPropagation()">${v}</span>`).join('');
    return `
      <div class="convo-line ${isHost?'host':'guest'}" id="cl-${i}" onclick="toggleConvoLine(${i})">
        <div class="convo-speaker-label">${isHost?'Wansa (host)':'Solja (guest)'}</div>
        <div class="convo-bubble">
          <div class="convo-ar ${revealed?'':'convo-hidden'}">${line.ar}</div>
          <div class="convo-ph ${revealed?'':'convo-hidden'}">${line.ph}</div>
          <div class="convo-en ${revealed?'':'convo-hidden'}">${line.en}</div>
          ${revealed ? `<div class="convo-note">${line.note}</div><div class="convo-vocab-chips">${vocabChips}</div>` : '<div class="convo-reveal-btn">tap to reveal</div>'}
        </div>
      </div>`;
  }).join('');
}

function renderRespondScene(scene) {
  let html = '';
  for (let i = 0; i < scene.lines.length; i++) {
    const line = scene.lines[i];
    const isHost = line.speaker === 'host';
    const revealed = convoRevealedLines.has(i);
    if (isHost) {
      html += `
        <div class="convo-line host">
          <div class="convo-speaker-label">Wansa (host)</div>
          <div class="convo-bubble">
            <div class="convo-ar">${line.ar}</div>
            <div class="convo-ph">${line.ph}</div>
            <div class="convo-en">${line.en}</div>
          </div>
        </div>`;
      // Show the "your turn" prompt for the next guest line if it exists
      if (i+1 < scene.lines.length && scene.lines[i+1].speaker === 'guest') {
        const guestLine = scene.lines[i+1];
        const guestRevealed = convoRevealedLines.has(i+1);
        const vocabChips = guestLine.vocab.map(v => `<span class="convo-vc" id="rvc-${i+1}-${v}" onclick="toggleRVC('${i+1}-${v}')">${v}</span>`).join('');
        html += `
          <div class="convo-your-turn">
            <div class="convo-your-label">Your turn — respond as Solja</div>
            <div class="convo-your-prompt">Try to say the response in Sudanese Arabic using these words:</div>
            <div class="convo-vocab-chips">${vocabChips}</div>
            <div class="convo-answer-reveal ${guestRevealed?'show':''}" id="car-${i+1}">
              <div class="convo-ar">${guestLine.ar}</div>
              <div class="convo-ph">${guestLine.ph}</div>
              <div class="convo-en">${guestLine.en}</div>
              <div class="convo-note">${guestLine.note}</div>
            </div>
            ${!guestRevealed ? `<button class="convo-reveal-btn" onclick="revealConvoLine(${i+1})">Reveal Solja-s response</button>` : ''}
          </div>`;
        i++; // skip the guest line since we rendered it
      }
    } else if (!convoRevealedLines.has(i-1)) {
      // standalone guest line (no preceding host line in current iteration)
      const vocabChips = line.vocab.map(v => `<span class="convo-vc">${v}</span>`).join('');
      html += `
        <div class="convo-your-turn">
          <div class="convo-your-label">Your turn — respond as Solja</div>
          <div class="convo-vocab-chips">${vocabChips}</div>
          <div class="convo-answer-reveal ${revealed?'show':''}" id="car-${i}">
            <div class="convo-ar">${line.ar}</div><div class="convo-ph">${line.ph}</div><div class="convo-en">${line.en}</div>
            <div class="convo-note">${line.note}</div>
          </div>
          ${!revealed ? `<button class="convo-reveal-btn" onclick="revealConvoLine(${i})">Reveal response</button>` : ''}
        </div>`;
    }
  }
  return html;
}

function toggleConvoLine(i) {
  if (convoRevealedLines.has(i)) convoRevealedLines.delete(i);
  else convoRevealedLines.add(i);
  renderConvo();
}

function revealConvoLine(i) {
  convoRevealedLines.add(i);
  renderConvo();
}

function revealAllConvo() {
  CONVO_SCENES[convoSceneIdx].lines.forEach((_,i) => convoRevealedLines.add(i));
  renderConvo();
}

function hideAllConvo() {
  convoRevealedLines.clear();
  renderConvo();
}

function navConvo(dir) {
  const newIdx = convoSceneIdx + dir;
  if (newIdx < 0 || newIdx >= CONVO_SCENES.length) return;
  convoSceneIdx = newIdx;
  convoRevealedLines = new Set();
  convoUsedChips = new Set();
  renderConvo();
}

function toggleRVC(key) {
  const el = document.getElementById('rvc-' + key);
  if (!el) return;
  if (convoUsedChips.has(key)) { convoUsedChips.delete(key); el.classList.remove('used'); }
  else { convoUsedChips.add(key); el.classList.add('used'); }
}

let starredItems = new Set(); // stores item.a keys

function toggleStar(itemA){
  if(starredItems.has(itemA)) starredItems.delete(itemA);
  else starredItems.add(itemA);
  const lbl=document.getElementById('starred-nav-label');
  if(lbl) lbl.textContent=starredItems.size>0?`Starred (${starredItems.size})`:'Starred items';
  const btn=document.getElementById('star-btn-current');
  if(btn){
    const now=starredItems.has(itemA);
    btn.textContent=now?'\u2605':'\u2606';
    btn.classList.toggle('starred',now);
    btn.title=now?'Unstar':'Star for later';
  }
}

function starBtnHTML(itemA){
  const isStarred=starredItems.has(itemA);
  const enc=encodeURIComponent(itemA);
  return `<button class="star-btn ${isStarred?'starred':''}" id="star-btn-current" onclick="toggleStarEnc('${enc}');event.stopPropagation()" title="${isStarred?'Unstar':'Star for later'}">${isStarred?'\u2605':'\u2606'}</button>`;
}
function toggleStarEnc(enc){
  const itemA=decodeURIComponent(enc);
  toggleStar(itemA);
}

function renderStarred(){
  const ca=document.getElementById('content-area');
  if(starredItems.size===0){
    ca.innerHTML=`<div class="starred-empty">
      <div class="starred-empty-icon">☆</div>
      <div class="starred-empty-title">No starred items yet</div>
      <div class="starred-empty-body">While using any mode, tap the ☆ star icon on any card to save it here for review.</div>
    </div>`;
    return;
  }
  const all=[...V1,...V2,...P2,...EXTRA];
  const starred=all.filter(x=>starredItems.has(x.a));
  const byCat={};
  starred.forEach(it=>{if(!byCat[it.cat])byCat[it.cat]=[];byCat[it.cat].push(it);});
  let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
    <div style="font-size:14px;color:var(--text2)">${starred.length} starred item${starred.length!==1?'s':''}</div>
    <button class="starred-clear-btn" onclick="if(confirm('Clear all starred items?')){starredItems.clear();const l=document.getElementById('starred-nav-label');if(l)l.textContent='Starred items';renderStarred();}">Clear all</button>
  </div>`;
  Object.keys(byCat).sort().forEach(cat=>{
    html+=`<div class="starred-section-head">${cat}</div>`;
    byCat[cat].forEach(it=>{
      const srcLbl=it.src==='v1'?'Video 1':it.src==='v2'?'Video 2':'Glossary';
      html+=`<div class="starred-item">
        <div class="starred-item-body">
          <div class="starred-item-ar">${it.a}</div>
          <div class="starred-item-ph">${it.p}</div>
          <div class="starred-item-en">${it.e}</div>
          <div class="ctx-block" style="margin-top:8px;font-size:12px">${it.ctx}</div>
          <div class="deep-ex-block" style="margin-top:8px"><div class="deep-ex-ar">${it.ex}</div><div class="ex-ph-line">${it.p}</div><div class="deep-ex-en">${it.exen}</div></div>
          <div class="starred-item-src">${srcLbl} · ${it.type}</div>
        </div>
        <button class="star-btn starred" onclick="toggleStar(${JSON.stringify(it.a)});renderStarred()">★</button>
      </div>`;
    });
  });
  ca.innerHTML=html;
}

        <div style="font-size:13px;color:var(--text2);line-height:1.65">${intro.tip}</div>
      </div>
      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn btn-accent" style="padding:12px 32px;font-size:14px" onclick="dismissIntro()">Start \u2192</button>
      </div>
      <div style="text-align:center;margin-top:12px">
        <button style="background:transparent;border:none;color:var(--text3);font-size:12px;cursor:pointer;font-family:var(--sans)" onclick="skipAllIntros()">Skip all intros</button>
      </div>
    </div>
  `;
}
let _currentIntroMode='';
function dismissIntro(){introShown[_currentIntroMode]=true;render();}
function skipAllIntros(){Object.keys(introShown).forEach(k=>introShown[k]=true);render();}

// SYNONYMS DATA (key words with alternatives)
// ══════════════════════════════════════
